[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.34'
optimizer = true
optimizer_runs = 200
evm_version = 'cancun'

remappings = [
    "@osero/address-registry/=lib/osero-address-registry/src/"
]

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
